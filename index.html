<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mango Loan</title>
  <script>
    (function () {
      try {
        var path = (window.location.pathname || "").toLowerCase();
        if (path.indexOf("admin.html") !== -1 || path.indexOf("borrower.html") !== -1 || path.indexOf("reset-password.html") !== -1) return;
        var h = window.location.hash || "";
        var q = window.location.search || "";
        if (/[?&#]type=recovery(?:&|=|$)/.test(h + q) || h.indexOf("type=recovery") !== -1) {
          window.location.replace(new URL("reset-password.html" + q + h, window.location.href).href);
          return;
        }
        if (q.indexOf("code=") !== -1) {
          window.location.replace(new URL("reset-password.html" + q + h, window.location.href).href);
        }
      } catch (e) {}
    })();
  </script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --accent: #0f172a;
    }

    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 48px 20px 56px;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 36px);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .lead {
      margin: 0 0 32px;
      font-size: 17px;
      line-height: 1.55;
      color: var(--muted);
      max-width: 520px;
    }

    .cards {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 22px 22px 20px;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.04);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .card p {
      margin: 0 0 16px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    a.cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--line);
      background: white;
      color: var(--text);
      transition: 0.15s ease;
    }

    a.cta:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.08);
    }

    a.cta.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .footer-note {
      margin-top: 36px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Mango Loan</h1>
    <div class="cards">
      <div class="card">
        <h2>Admin</h2>
        <a class="cta" href="admin.html">Open admin dashboard</a>
      </div>

      <div class="card">
        <h2>Borrower portal</h2>
        <p>View your balance, due date, and payment history.</p>
        <a class="cta" href="borrower.html">Open borrower portal</a>
      </div>
    </div>

    <p class="footer-note">
      Data lives in Supabase. Bookmark this page as your starting point, or go straight to <a href="admin.html" style="color:var(--text);font-weight:600;">admin.html</a> for the tracker.
    </p>
  </div>
</body>
</html>
